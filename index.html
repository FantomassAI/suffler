<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Суфлер</title>
<style>
  :root {
    --bg: #f5f5f1;
    --panel: #ffffff;
    --border: #d9d9d2;
    --text: #16181c;
    --dim: #70747c;
    --accent: #2563eb;
    --highlight: #ffe36b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

  .screen { display: none; height: 100%; }
  .screen.active { display: flex; flex-direction: column; }

  /* ---------- Editor ---------- */
  #editor { padding: 20px; gap: 14px; max-width: 900px; margin: 0 auto; width: 100%; }
  #editor h1 { font-size: 22px; font-weight: 700; }
  #editor h1 span { color: var(--dim); font-size: 14px; font-weight: 400; margin-left: 8px; }
  #script {
    flex: 1; width: 100%; background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 12px; padding: 16px;
    font-size: 17px; line-height: 1.6; resize: none; outline: none;
    font-family: inherit; display: block;
  }
  #script:focus { border-color: var(--accent); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .ctrl { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--dim); }
  .ctrl input[type=range] { width: 110px; accent-color: var(--accent); }
  .ctrl output { color: var(--text); min-width: 34px; text-align: right; }
  button { font: inherit; cursor: pointer; border: none; border-radius: 10px; }
  .btn-mode { padding: 10px 14px; background: var(--panel); color: var(--dim); border: 1px solid var(--border); font-size: 14px; }
  .btn-mode.sel { background: #e3ecff; color: var(--accent); border-color: var(--accent); font-weight: 600; }
  #startBtn { padding: 14px 28px; background: var(--accent); color: #fff; font-size: 17px; font-weight: 600; margin-left: auto; }
  #startBtn:disabled { opacity: .5; cursor: default; }
  #status { font-size: 13px; color: var(--dim); min-height: 18px; }
  #status.err { color: #ff7b72; }

  /* ---------- Prompter ---------- */
  #prompter { background: var(--bg); position: relative; overflow: hidden; }
  #scroller { flex: 1; overflow: hidden; position: relative; }
  #content {
    position: absolute; left: 50%; transform: translateX(-50%);
    padding: 52vh 24px 60vh; will-change: top; top: 0;
    text-align: left; font-weight: 600;
  }
  #content .w { color: var(--text); transition: color .3s; }
  #content .w.done { color: #c6c6bf; }
  #content .w.cursent { text-decoration: underline; text-decoration-color: var(--highlight);
    text-decoration-thickness: 7px; text-underline-offset: 0.18em; text-decoration-skip-ink: none; }

  #topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; gap: 8px; align-items: center; padding: 12px 16px;
    background: linear-gradient(#f5f5f1ee, #f5f5f100); transition: opacity .3s;
  }
  #topbar.hidden { opacity: 0; pointer-events: none; }
  #topbar button { background: #16181c12; color: var(--text); border: 1px solid var(--border); padding: 10px 16px; font-size: 15px; backdrop-filter: blur(10px); }
  #micdot { width: 12px; height: 12px; border-radius: 50%; background: #444; margin-left: 4px; }
  #micdot.on { background: #2ecc71; box-shadow: 0 0 0 0 #2ecc7160; }
  #heard { flex: 1; font-size: 13px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; direction: rtl; text-align: left; }
  #speedCtl { display: none; align-items: center; gap: 6px; color: var(--dim); font-size: 13px; }
  #speedCtl input { width: 120px; accent-color: var(--accent); }
  #pausedBadge { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: #fffffff2; border: 1px solid var(--border); padding: 14px 26px; border-radius: 14px; box-shadow: 0 8px 30px #0002;
    font-size: 20px; z-index: 9; display: none; }
  #marker { position: absolute; left: 0; top: 50vh; width: 14px; height: 4px; background: var(--highlight); border-radius: 2px; z-index: 5; opacity: .8; }

  /* loading overlay */
  #loader { position: fixed; inset: 0; background: var(--bg); z-index: 50;
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  #loader.show { display: flex; }
  .spin { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: sp 1s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }
  #loaderText { color: var(--dim); font-size: 15px; }
</style>
</head>
<body>

<!-- ============ EDITOR ============ -->
<div id="editor" class="screen active">
  <h1>Суфлер <span>текст зберігається автоматично · v10</span></h1>
  <textarea id="script" placeholder="Вставте сюди текст уроку…"></textarea>
  <div class="row">
    <div class="ctrl">Шрифт <input type="range" id="fontSize" min="20" max="90" value="52"><output id="fontOut">52</output></div>
    <div class="ctrl">Інтервал <input type="range" id="lineH" min="120" max="220" value="150"><output id="lineOut">1.5</output></div>
    <div class="ctrl">Ширина <input type="range" id="colW" min="50" max="100" value="90"><output id="colOut">90%</output></div>
  </div>
  <div class="row">
    <button class="btn-mode sel" id="modeVoice">🎙 За голосом</button>
    <button class="btn-mode" id="modeAuto">▶️ Авто-прокрутка</button>
    <button id="startBtn">Старт</button>
  </div>
  <div id="status"></div>
</div>

<!-- ============ PROMPTER ============ -->
<div id="prompter" class="screen">
  <div id="topbar">
    <button id="exitBtn">✕ Вийти</button>
    <button id="fMinus">A−</button>
    <button id="fPlus">A+</button>
    <button id="restartBtn">⟲ Спочатку</button>
    <div id="speedCtl">Швидкість <input type="range" id="speed" min="10" max="150" value="45"></div>
    <div id="heard"></div>
    <div id="micdot"></div>
  </div>
  <div id="marker"></div>
  <div id="pausedBadge">Пауза — торкніться, щоб продовжити</div>
  <div id="scroller"><div id="content"></div></div>
</div>

<div id="loader"><div class="spin"></div><div id="loaderText">Завантаження…</div></div>

<script src="lib/vosk.js"></script>
<script>
"use strict";
const $ = id => document.getElementById(id);

/* ---------------- state & settings ---------------- */
const S = {
  mode: "voice",            // voice | auto
  fontSize: 52, lineH: 1.5, colW: 90,
  words: [],                // {raw, norm, el}
  pos: 0,                   // index of next expected word
  running: false, paused: false,
  targetTop: 0, curTop: 0,
  autoSpeed: 45,            // px/sec
  model: null, recognizer: null, audioCtx: null, stream: null, procNode: null,
  wakeLock: null, raf: null, lastT: 0,
};

/* restore saved */
try {
  $("script").value = localStorage.getItem("prompter_text") || "";
  const cfg = JSON.parse(localStorage.getItem("prompter_cfg") || "{}");
  Object.assign(S, cfg);
} catch(e) {}
$("fontSize").value = S.fontSize; $("lineH").value = S.lineH * 100; $("colW").value = S.colW;

function saveCfg() {
  localStorage.setItem("prompter_cfg", JSON.stringify({
    mode: S.mode, fontSize: S.fontSize, lineH: S.lineH, colW: S.colW, autoSpeed: S.autoSpeed
  }));
}
$("script").addEventListener("input", () => localStorage.setItem("prompter_text", $("script").value));

/* ---------------- editor controls ---------------- */
const syncOuts = () => {
  $("fontOut").textContent = S.fontSize;
  $("lineOut").textContent = S.lineH.toFixed(1);
  $("colOut").textContent = S.colW + "%";
  /* live preview in the editor: the textarea shows exactly how
     the prompter text will look */
  const ta = $("script");
  ta.style.fontSize = S.fontSize + "px";
  ta.style.lineHeight = S.lineH;
  ta.style.width = S.colW + "%";
  ta.style.margin = "0 auto";
};
$("fontSize").oninput = e => { S.fontSize = +e.target.value; syncOuts(); saveCfg(); };
$("lineH").oninput   = e => { S.lineH = e.target.value / 100; syncOuts(); saveCfg(); };
$("colW").oninput    = e => { S.colW = +e.target.value; syncOuts(); saveCfg(); };
syncOuts();

function setMode(m) {
  S.mode = m; saveCfg();
  $("modeVoice").classList.toggle("sel", m === "voice");
  $("modeAuto").classList.toggle("sel", m === "auto");
}
$("modeVoice").onclick = () => setMode("voice");
$("modeAuto").onclick = () => setMode("auto");
setMode(S.mode);

/* ---------------- text processing ---------------- */
function normWord(w) {
  return w.toLowerCase()
    .replace(/[’'ʼ`]/g, "")
    .replace(/[^а-щьюяїієґa-z0-9]/gi, "");
}
function buildContent() {
  const text = $("script").value.trim();
  const content = $("content");
  content.innerHTML = "";
  S.words = [];
  S.sentEls = [];
  let sent = 0, inStage = false;
  const paragraphs = text.split(/\n+/);
  for (const p of paragraphs) {
    const pEl = document.createElement("p");
    pEl.style.margin = "0 0 0.8em";
    for (const tok of p.split(/\s+/)) {
      if (!tok) continue;
      const span = document.createElement("span");
      span.className = "w";
      span.textContent = tok + " ";
      pEl.appendChild(span);
      /* stage directions like ‹ВСТАВ: скрин› or [пауза] are never read aloud */
      if (/^[‹\[(]/.test(tok)) inStage = true;
      const stage = inStage;
      if (/[›\])]\.?,?$/.test(tok)) inStage = false;
      const norm = normWord(tok);
      /* matchable = something the Ukrainian recognizer could actually emit:
         cyrillic, длинее 2 букв, не ремарка. Латиниця, цифри, символи —
         "прозорі": їх перестрибуємо безкоштовно. */
      const matchable = !stage && norm.length > 2 && /[а-яїієґ]/.test(norm);
      S.words.push({ raw: tok, norm, el: span, sent, matchable });
      (S.sentEls[sent] = S.sentEls[sent] || []).push(span);
      if (/[.!?…]["»)]?$/.test(tok)) sent++;
    }
    sent++; // paragraph break always ends a sentence
    content.appendChild(pEl);
  }
  /* index of matchable words for gap-free scanning */
  S.midx = []; S.mBefore = new Array(S.words.length + 1);
  S.words.forEach((w, i) => {
    S.mBefore[i] = S.midx.length;
    if (w.matchable) S.midx.push(i);
  });
  S.mBefore[S.words.length] = S.midx.length;
  /* sentence of the last real (spoken) word — the "finish line" */
  S.endSent = S.midx.length ? S.words[S.midx[S.midx.length - 1]].sent : -1;
}

/* ---------------- fuzzy matching ----------------
   Ukrainian endings vary and ASR makes mistakes, so:
   words match if equal, or share a prefix of >=4 chars,
   or (len>=5) differ by at most 1 edit. */
function wordsMatch(a, b) {
  if (!a || !b) return false;
  if (a === b) return true;
  const minL = Math.min(a.length, b.length);
  if (minL >= 4 && a.slice(0, 4) === b.slice(0, 4)) return true;
  if (minL >= 5 && Math.abs(a.length - b.length) <= 1) {
    let diff = 0;
    for (let i = 0, j = 0; i < a.length && j < b.length; i++, j++) {
      if (a[i] !== b[j]) {
        if (++diff > 1) return false;
        if (a.length > b.length) j--;
        else if (b.length > a.length) i--;
      }
    }
    return true;
  }
  return false;
}

const LOOKAHEAD = 45;
/* advance S.pos using words heard from the mic.
   Commit rules balance snappiness vs ad-lib safety:
   - a single word advancing exactly to the next expected word → instant;
   - >=2 matches forming a dense run → normal reading;
   - >=4 matches → strong evidence, allows catching up after a
     mis-recognized stretch (e.g. a new paragraph). */
/* scan in "matchable words" space: unpronounceable tokens
   (latin, numbers, stage directions) are transparent */
function scanFrom(fullStart, words) {
  const mpStart = S.mBefore[Math.min(fullStart, S.words.length)];
  let mp = mpStart, matched = 0, lastM = -1;
  for (const hw of words) {
    const limit = Math.min(S.midx.length, mp + LOOKAHEAD);
    for (let j = mp; j < limit; j++) {
      if (wordsMatch(hw, S.words[S.midx[j]].norm)) {
        mp = j + 1; matched++; lastM = j; break;
      }
    }
  }
  return {
    pos: lastM >= 0 ? S.midx[lastM] + 1 : fullStart,
    mjump: mp - mpStart,
    matched
  };
}

let stall = 0, recent = [];
function followWords(fresh) {
  if (!fresh.length) return;
  recent.push(...fresh);
  if (recent.length > 14) recent = recent.slice(-14);
  const { pos, matched, mjump } = scanFrom(S.pos, fresh.slice(-10));
  if (pos > S.pos) {
    if ((matched === 1 && mjump <= 2) ||
        (matched >= 2 && mjump <= matched * 8) ||
        matched >= 4) { stall = 0; setPos(pos); return; }
  }
  /* recovery: words keep coming but nothing matches ahead — the pointer
     likely drifted past the reader; scan BEHIND with the recent-words
     buffer and quietly re-anchor */
  if (++stall >= 5) {
    const back = scanFrom(Math.max(0, S.pos - 40), recent.slice(-10));
    if (back.matched >= 4 && back.pos !== S.pos) { stall = 0; setPos(back.pos); }
  }
}

/* Vosk partials are cumulative within an utterance — every word must be
   consumed exactly once, or repeats re-match similar words further ahead
   and drag the pointer away from the reader. */
let utterSeen = 0;
function follow(heardText, isFinal) {
  const heard = heardText.split(/\s+/).map(normWord).filter(w => w.length > 2);
  if (utterSeen > heard.length) utterSeen = heard.length; // partial was revised shorter
  const fresh = heard.slice(utterSeen);
  utterSeen = isFinal ? 0 : heard.length;
  followWords(fresh);
}

function setPos(pos) {
  for (let i = S.pos; i < pos && i < S.words.length; i++) {
    S.words[i].el.classList.add("done");
  }
  /* re-anchoring backward: un-fade what is being read again */
  for (let i = pos; i < S.pos && i < S.words.length; i++) {
    S.words[i].el.classList.remove("done");
  }
  S.pos = pos;
  const cur = S.words[Math.min(pos, S.words.length - 1)];
  if (cur) {
    // underline the whole current sentence, not individual words
    if (S.curSent !== cur.sent) {
      if (S.sentEls[S.curSent]) S.sentEls[S.curSent].forEach(el => el.classList.remove("cursent"));
      S.curSent = cur.sent;
      if (S.sentEls[S.curSent]) S.sentEls[S.curSent].forEach(el => el.classList.add("cursent"));
    }
    // keep the reading position vertically centered;
    // offsetTop is relative to #content, so no other terms belong here
    const t = -(cur.el.offsetTop - window.innerHeight * 0.44);
    // text may only move up — never jerk back down
    if (t < S.targetTop) S.targetTop = t;
  }
  // auto-restart: once every spoken word is consumed, (re)arm an 8s idle
  // timer; silence at the very end restarts from the top on its own
  const remaining = S.midx.length - S.mBefore[Math.min(S.pos, S.words.length)];
  if (S.midx.length && remaining <= 0) armEndTimer();
  else clearEndTimer();
}

/* ---------------- auto-restart at the end ---------------- */
let endTimer = null;
const AUTO_RESTART_MS = 8000;
function clearEndTimer() {
  if (endTimer) { clearTimeout(endTimer); endTimer = null; }
  if (S.mode === "voice") $("pausedBadge").style.display = "none";
}
function armEndTimer() {
  if (endTimer) clearTimeout(endTimer);
  $("pausedBadge").textContent = "Кінець уроку — авто-перезапуск за 8 с";
  $("pausedBadge").style.display = "block";
  endTimer = setTimeout(() => { endTimer = null; restartToStart(); }, AUTO_RESTART_MS);
}
function restartToStart() {
  clearEndTimer();
  S.words.forEach(w => w.el.className = "w");
  S.pos = 0; S.curSent = -1; S.targetTop = Infinity;
  utterSeen = 0; stall = 0; recent = [];
  setPos(0); S.curTop = S.targetTop;
}

/* ---------------- scrolling loop ---------------- */
function loop(t) {
  S.raf = requestAnimationFrame(loop);
  const dt = Math.min((t - S.lastT) / 1000, 0.1); S.lastT = t;
  if (S.mode === "auto") {
    if (!S.paused) S.targetTop -= S.autoSpeed * dt;
  }
  // smooth approach with a hard speed cap: the text glides like a
  // conveyor belt and can never jerk, even after a big catch-up
  const diff = S.targetTop - S.curTop;
  const lineH = S.fontSize * S.lineH;               // px per text line
  const maxV = lineH * 3.2;                          // max px/sec (~3 lines/s)
  let v = diff * 2.2;                                // gentle proportional pull
  if (v < -maxV) v = -maxV; if (v > maxV) v = maxV;
  S.curTop += v * dt;
  if (Math.abs(diff) < 0.3) S.curTop = S.targetTop;
  $("content").style.top = S.curTop + "px";
}

/* ---------------- voice engine ---------------- */
const setLoader = t => {
  $("loaderText").textContent = t;
  /* mirror progress into the editor status line (background preload) */
  const st = $("status");
  if (!st.classList.contains("err")) st.textContent = t;
};
/* surface any silent worker/promise errors onto the loader screen */
window.addEventListener("error", e => {
  if ($("loader").classList.contains("show"))
    setLoader("Помилка: " + (e.message || "невідома") + " — перезавантажте сторінку");
});
window.addEventListener("unhandledrejection", e => {
  if ($("loader").classList.contains("show"))
    setLoader("Помилка: " + (e.reason && e.reason.message || e.reason || "невідома") + " — перезавантажте сторінку");
});
function withTimeout(promise, ms, what) {
  return Promise.race([promise, new Promise((_, rej) =>
    setTimeout(() => rej(new Error(what + " — не вдалося за " + (ms/1000) + " с. Перезавантажте сторінку.")), ms))]);
}

async function loadModel() {
  /* Safari resolves worker-relative paths differently, so the model URL
     must be absolute — a relative path 404s silently inside the worker. */
  const MODEL_URL = new URL("model-uk.tar.gz", location.href).href;
  try {
    /* step 1: download with visible progress (warms the browser cache) */
    setLoader("Підготовка розпізнавача… 0%");
    const resp = await fetch(MODEL_URL);
    if (!resp.ok) throw new Error("не вдалося завантажити модель (HTTP " + resp.status + ")");
    const total = +resp.headers.get("Content-Length") || 77620626;
    const reader = resp.body.getReader();
    let got = 0;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      got += value.length;
      setLoader("Підготовка розпізнавача… " + Math.min(100, Math.round(got / total * 100)) + "%");
    }
    /* step 2: initialize the recognizer (reads from cache) */
    setLoader("Запуск розпізнавача…");
    S.model = await withTimeout(Vosk.createModel(MODEL_URL), 180000, "Запуск розпізнавача");
    setLoader("Розпізнавач готовий ✓");
  } catch (e) {
    setLoader("Помилка: " + (e.message || e));
    throw e;
  }
}

/* preload once per page load; retried automatically if it failed */
let modelPromise = null;
function ensureModel() {
  if (S.model) return Promise.resolve();
  if (!modelPromise) modelPromise = loadModel().catch(e => { modelPromise = null; throw e; });
  return modelPromise;
}
window.addEventListener("load", () => { ensureModel().catch(() => {}); });

async function startMic() {
  S.stream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: true, noiseSuppression: true, channelCount: 1 }
  });
  S.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  await S.audioCtx.resume();
  const rec = new S.model.KaldiRecognizer(S.audioCtx.sampleRate);
  rec.setWords(false);
  rec.on("partialresult", m => { const p = m.result.partial; if (p) { follow(p, false); showHeard(p); } });
  rec.on("result", m => { const p = m.result.text; if (p) { follow(p, true); showHeard(p); } });
  S.recognizer = rec;

  const src = S.audioCtx.createMediaStreamSource(S.stream);
  const proc = S.audioCtx.createScriptProcessor(2048, 1, 1);
  proc.onaudioprocess = e => {
    try { rec.acceptWaveform(e.inputBuffer); } catch(err) {}
    // mic level indicator
    const d = e.inputBuffer.getChannelData(0);
    let sum = 0; for (let i = 0; i < d.length; i += 8) sum += d[i] * d[i];
    const rms = Math.sqrt(sum / (d.length / 8));
    const dot = $("micdot");
    dot.classList.add("on");
    dot.style.transform = `scale(${1 + Math.min(rms * 14, 1.6)})`;
  };
  const mute = S.audioCtx.createGain(); mute.gain.value = 0;
  src.connect(proc); proc.connect(mute); mute.connect(S.audioCtx.destination);
  S.procNode = proc; S.srcNode = src; S.muteNode = mute;
}

function stopMic() {
  try { S.procNode && S.procNode.disconnect(); S.srcNode && S.srcNode.disconnect(); S.muteNode && S.muteNode.disconnect(); } catch(e){}
  try { S.recognizer && S.recognizer.remove(); } catch(e){}
  try { S.stream && S.stream.getTracks().forEach(t => t.stop()); } catch(e){}
  try { S.audioCtx && S.audioCtx.close(); } catch(e){}
  S.recognizer = S.audioCtx = S.stream = S.procNode = null;
  $("micdot").classList.remove("on");
}

let heardTimer;
function showHeard(text) {
  $("heard").textContent = text.split(/\s+/).slice(-7).join(" ");
  clearTimeout(heardTimer);
  heardTimer = setTimeout(() => { $("heard").textContent = ""; }, 4000);
}

/* ---------------- start / stop ---------------- */
$("startBtn").onclick = async () => {
  const text = $("script").value.trim();
  const st = $("status");
  st.className = ""; st.textContent = "";
  if (!text) { st.className = "err"; st.textContent = "Спочатку вставте текст."; return; }
  $("startBtn").disabled = true;
  try {
    if (S.mode === "voice") {
      if (!S.model) {
        $("loader").classList.add("show");
        await ensureModel();
        $("loader").classList.remove("show");
      }
      await startMic();
    }
    enterPrompter();
  } catch (e) {
    $("loader").classList.remove("show");
    st.className = "err";
    st.textContent = e.name === "NotAllowedError"
      ? "Немає доступу до мікрофона. Дозвольте доступ у налаштуваннях Safari."
      : "Помилка: " + (e.message || e);
    stopMic();
  }
  $("startBtn").disabled = false;
};

function applyTypography() {
  const c = $("content");
  c.style.fontSize = S.fontSize + "px";
  c.style.lineHeight = S.lineH;
  c.style.width = S.colW + "%";
  c.style.maxWidth = "1100px";
}

function enterPrompter() {
  buildContent();
  applyTypography();
  S.pos = 0; S.curTop = 0; S.targetTop = Infinity; S.paused = false; S.curSent = -1;
  utterSeen = 0; stall = 0; recent = [];
  $("pausedBadge").style.display = "none";
  $("speedCtl").style.display = S.mode === "auto" ? "flex" : "none";
  $("speed").value = S.autoSpeed;
  $("editor").classList.remove("active");
  $("prompter").classList.add("active");
  setPos(0);
  S.curTop = S.targetTop; // start without animation jump
  S.running = true; S.lastT = performance.now();
  S.raf = requestAnimationFrame(loop);
  requestWakeLock();
  if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
  scheduleBarHide();
}

function exitPrompter() {
  S.running = false;
  clearEndTimer();
  cancelAnimationFrame(S.raf);
  stopMic();
  releaseWakeLock();
  if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  $("prompter").classList.remove("active");
  $("editor").classList.add("active");
}
$("exitBtn").onclick = exitPrompter;
$("restartBtn").onclick = restartToStart;
$("fPlus").onclick = () => { S.fontSize = Math.min(S.fontSize + 4, 90); applyTypography(); saveCfg(); setPos(S.pos); $("fontSize").value = S.fontSize; syncOuts(); };
$("fMinus").onclick = () => { S.fontSize = Math.max(S.fontSize - 4, 20); applyTypography(); saveCfg(); setPos(S.pos); $("fontSize").value = S.fontSize; syncOuts(); };
$("speed").oninput = e => { S.autoSpeed = +e.target.value; saveCfg(); };

/* tap: auto mode → pause/resume; voice mode → show/hide bar */
let barTimer;
function scheduleBarHide() {
  clearTimeout(barTimer);
  barTimer = setTimeout(() => $("topbar").classList.add("hidden"), 4000);
}
$("scroller").addEventListener("click", () => {
  if (S.mode === "auto") {
    S.paused = !S.paused;
    $("pausedBadge").style.display = S.paused ? "block" : "none";
  }
  $("topbar").classList.remove("hidden");
  scheduleBarHide();
});
$("topbar").addEventListener("click", scheduleBarHide);

/* ---------------- wake lock ---------------- */
async function requestWakeLock() {
  try { S.wakeLock = await navigator.wakeLock.request("screen"); } catch(e) {}
}
function releaseWakeLock() { try { S.wakeLock && S.wakeLock.release(); S.wakeLock = null; } catch(e) {} }
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && S.running) requestWakeLock();
});
</script>
</body>
